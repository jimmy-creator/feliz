server {
    listen 80;
    server_name felizoman.com www.felizoman.com;

    # Built frontend lives here; hashed assets are served directly by nginx,
    # but HTML routes are proxied to Node so the htmlInject middleware can
    # emit per-URL <title>/meta/JSON-LD for crawlers (SEO).
    root /var/www/feliz/client/dist;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets served straight from dist (fast, immutable) ──────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location = /favicon.png        { expires 30d; try_files $uri =404; }
    location = /favicon.svg        { expires 30d; try_files $uri =404; }
    location = /apple-touch-icon.png { expires 30d; try_files $uri =404; }

    # ── Node-served endpoints ──────────────────────────────────────────────
    # API (websockets upgrade supported)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded product images (Sharp-processed WebP + OG JPEGs)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap + robots are generated by Node
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
    location = /robots.txt {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ── SPA HTML routes → Node (htmlInject serves per-URL crawler meta) ─────
    # NOTE: do NOT `try_files ... /index.html` here — that would bypass
    # htmlInject and serve generic meta to crawlers.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Block dotfiles + sensitive extensions
    location ~ /\. { deny all; }
    location ~ \.(env|git|sql|log)$ { deny all; }
}
